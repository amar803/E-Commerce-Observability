filebeat.inputs:
  - type: filestream
    id: app-logs
    enabled: true
    paths:
      - /var/log/app/*.json
      - /var/log/app/*.log
    parsers:
      - ndjson:
          target: ""
          add_error_key: true
          overwrite_keys: true

setup.ilm.enabled: false
setup.template.enabled: true
setup.template.name: "app-logs"
setup.template.pattern: "app-logs-*"

output.elasticsearch:
  hosts: ["http://elasticsearch:9200"]
  index: "app-logs-%{+yyyy.MM.dd}"

processors:
  - rename:
      fields:
        - from: "service"
          to: "service.name"
      ignore_missing: true
      fail_on_error: false
  - add_host_metadata: {}
  - add_cloud_metadata: {}
